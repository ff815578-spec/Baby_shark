<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baby Shark Store</title>

<style>
body{
font-family:Arial,sans-serif;
margin:0;
background:#f2f2f2;
}
header{
background:#111;
color:white;
padding:20px;
text-align:center;
}
.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
padding:15px;
}
.card{
background:white;
border-radius:10px;
padding:10px;
box-shadow:0 2px 8px rgba(0,0,0,.2);
text-align:center;
}
.card img{
width:100%;
border-radius:8px;
}
button{
background:#000;
color:#fff;
border:none;
padding:10px 15px;
border-radius:5px;
cursor:pointer;
}
</style>
</head>
<body>

<header>
<h1>Baby Shark Store</h1>
<p>Premium T-Shirts Collection</p>
</header>

<div class="products">

<div class="card">
<img src="https://picsum.photos/300?random=1">
<h3>Black Oversized</h3>
<p>৳650</p>
<button>Order</button>
</div>

<div class="card">
<img src="https://picsum.photos/300?random=2">
<h3>White Oversized</h3>
<p>৳700</p>
<button>Order</button>
</div>

<div class="card">
<img src="https://picsum.photos/300?random=3">
<h3>Blue T-Shirt</h3>
<p>৳600</p>
<button>Order</button>
</div>

<div class="card">
<img src="https://picsum.photos/300?random=4">
<h3>Red T-Shirt</h3>
<p>৳750</p>
<button>Order</button>
</div>

</div>

</body>
</html>
