<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baby Shark Store</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f5f5f5;
}
header{
    background:#111;
    color:#fff;
    text-align:center;
    padding:20px;
}
.products{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    padding:20px;
}
.card{
    background:#fff;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 5px 15px rgba(0,0,0,.15);
    text-align:center;
}
.card img{
    width:100%;
    height:250px;
    object-fit:cover;
}
.card h3{
    margin:10px 0;
}
.price{
    color:#e91e63;
    font-size:20px;
    font-weight:bold;
}
.btn{
    display:inline-block;
    margin:15px;
    padding:12px 20px;
    background:#111;
    color:#fff;
    text-decoration:none;
    border-radius:8px;
}
.btn:hover{
    background:#444;
}
</style>
</head>

<body>

<header>
<h1>Baby Shark Store</h1>
<p>Premium Oversized T-Shirts</p>
</header>

<div class="products">

<div class="card">
<img src="https://picsum.photos/400?random=1">
<h3>Black Oversized</h3>
<p class="price">৳650</p>
<a class="btn" href="https://wa.me/8801609198896?text=Hello%20Baby%20Shark%20Store,%20I%20want%20to%20order%20the%20Black%20Oversized%20T-Shirt.">Order Now</a>
</div>

<div class="card">
<img src="https://picsum.photos/400?random=2">
<h3>White Oversized</h3>
<p class="price">৳700</p>
<a class="btn" href="https://wa.me/8801609198896?text=Hello%20Baby%20Shark%20Store,%20I%20want%20to%20order%20the%20White%20Oversized%20T-Shirt.">Order Now</a>
</div>

<div class="card">
<img src="https://picsum.photos/400?random=3">
<h3>Blue Oversized</h3>
<p class="price">৳600</p>
<a class="btn" href="https://wa.me/8801609198896?text=Hello%20Baby%20Shark%20Store,%20I%20want%20to%20order%20the%20Blue%20Oversized%20T-Shirt.">Order Now</a>
</div>

<div class="card">
<img src="https://picsum.photos/400?random=4">
<h3>Red Oversized</h3>
<p class="price">৳750</p>
<a class="btn" href="https://wa.me/8801609198896?text=Hello%20Baby%20Shark%20Store,%20I%20want%20to%20order%20the%20Red%20Oversized%20T-Shirt.">Order Now</a>
</div>

</div>

</body>
</html>
