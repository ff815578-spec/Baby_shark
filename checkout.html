<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baby Shark Store - Checkout</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f4f4;
padding:20px;
}

.container{
max-width:500px;
margin:auto;
background:#fff;
padding:20px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.2);
}

h1{
text-align:center;
margin-bottom:20px;
color:#111;
}

label{
display:block;
margin-top:15px;
margin-bottom:5px;
font-weight:bold;
}

input,
textarea,
select{
width:100%;
padding:12px;
border:1px solid #ccc;
border-radius:8px;
font-size:16px;
}

textarea{
height:90px;
resize:none;
}

.payment-box{
display:none;
margin-top:15px;
padding:15px;
background:#fafafa;
border:1px solid #ddd;
border-radius:10px;
}

button{
width:100%;
padding:15px;
margin-top:20px;
background:#111;
color:#fff;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#333;
}
</style>

</head>

<body>

<div class="container">

<h1>Baby Shark Store</h1>

<form id="orderForm">

<label>Full Name</label>
<input type="text" id="name" placeholder="Enter your full name" required>

<label>Phone Number</label>
<input type="tel" id="phone" placeholder="01XXXXXXXXX" required>

<label>District (জেলা)</label>
<input type="text" id="district" placeholder="Cumilla" required>

<label>Thana / Upazila</label>
<input type="text" id="thana" placeholder="Debidwar" required>

<label>Full Address</label>
<textarea id="address" placeholder="Village / Road / House No." required></textarea>

<label>Select Size</label>
<select id="size" required>
<option value="">Choose Size</option>
<option>S</option>
<option>M</option>
<option>L</option>
<option>XL</option>
</select>

<label>Quantity</label>
<input type="number" id="qty" value="1" min="1" required>

<label>Payment Method</label>

<select id="payment" required>

<option value="">Select Payment</option>

<option value="cod">Cash On Delivery</option>

<option value="bkash">bKash</option>

<option value="nagad">Nagad</option>

</select>

<div id="paymentInfo" class="payment-box"></div>

<label>Order Note (Optional)</label>

<textarea id="note" placeholder="Write your note..."
></textarea><div id="paymentInfo" class="payment-box"></div>

<button type="submit">🛒 Place Order</button>

</form>

</div>

<script>

const payment = document.getElementById("payment");
const box = document.getElementById("paymentInfo");

payment.addEventListener("change", function(){

if(this.value==="bkash"){

box.style.display="block";

box.innerHTML=`
<h3>🟣 bKash Payment</h3>
<p>Send Money To</p>
<h2>01609198896</h2>
<p>Type: Personal</p>
`;

}

else if(this.value==="nagad"){

box.style.display="block";

box.innerHTML=`
<h3>🟠 Nagad Payment</h3>
<p>Send Money To</p>
<h2>01609198896</h2>
<p>Type: Personal</p>
`;

}

else if(this.value==="cod"){

box.style.display="block";

box.innerHTML=`
<h3>🚚 Cash On Delivery</h3>
<p>Pay when you receive your parcel.</p>
`;

}

else{

box.style.display="none";

}

});

document.getElementById("orderForm").addEventListener("submit",function(e){

e.preventDefault();

let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let district=document.getElementById("district").value;
let thana=document.getElementById("thana").value;
let address=document.getElementById("address").value;
let size=document.getElementById("size").value;
let qty=document.getElementById("qty").value;
let pay=document.getElementById("payment").value;
let note=document.getElementById("note").value;

let msg=`🛒 *Baby Shark Store Order*

👤 Name: ${name}
📞 Phone: ${phone}

🏙️ District: ${district}
📍 Thana: ${thana}

🏠 Address:
${address}

👕 Size: ${size}
🔢 Quantity: ${qty}

💳 Payment: ${pay}

📝 Order Note:
${note}`;

let url="https://wa.me/8801609198896?text="+encode
</body>
</html>
