<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baby Shark Store - Checkout</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f4f4;
padding:20px;
}

.container{
max-width:500px;
margin:auto;
background:#fff;
padding:20px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,.15);
}

h1{
text-align:center;
margin-bottom:20px;
}

label{
display:block;
margin-top:15px;
font-weight:bold;
}

input,textarea,select{
width:100%;
padding:12px;
margin-top:6px;
border:1px solid #ccc;
border-radius:8px;
font-size:16px;
}

textarea{
height:100px;
resize:none;
}

.payment-box{
display:none;
background:#f8f8f8;
border:1px solid #ddd;
padding:12px;
margin-top:15px;
border-radius:8px;
}

.payment-box h3{
margin-bottom:10px;
}

button{
width:100%;
padding:15px;
margin-top:20px;
background:#111;
color:#fff;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#333;
}
</style>
</head>

<body>

<div class="container">

<h1>Baby Shark Store</h1>

<form id="orderForm">

<label>Full Name</label>
<input type="text" required>

<label>Phone Number</label>
<input type="tel" required>

<label>Delivery Address</label>
<textarea required></textarea>

<label>Select Size</label>
<select required>
<option value="">Choose Size</option>
<option>S</option>
<option>M</option>
<option>L</option>
<option>XL</option>
</select>

<label>Payment Method</label>
<select id="payment" required>
<option value="">Select Payment</option>
<option value="cod">Cash On Delivery</option>
<option value="bkash">bKash</option>
<option value="nagad">Nagad</option>
</select>

<div id="paymentInfo" class="payment-box"></div>

<button type="submit">Place Order</button>

</form>

</div>

<script>

const payment=document.getElementById("payment");
const box=document.getElementById("paymentInfo");

payment.addEventListener("change",function(){

if(this.value==="bkash"){
box.style.display="block";
box.innerHTML=`
<h3>bKash Payment</h3>
<p>Send Money To:</p>
<h2>01609198896</h2>
<p>Type: Personal</p>
`;
}

else if(this.value==="nagad"){
box.style.display="block";
box.innerHTML=`
<h3>Nagad Payment</h3>
<p>Send Money To:</p>
<h2>01609198896</h2>
<p>Type: Personal</p>
`;
}

else if(this.value==="cod"){
box.style.display="block";
box.innerHTML=`
<h3>Cash On Delivery</h3>
<p>Pay cash when your order is delivered.</p>
`;
}

else{
box.style.display="none";
}

});

document.getElementById("orderForm").addEventListener("submit",function(e){

e.preventDefault();

alert("🎉 Thank you! Your order has been received.");

this.reset();

box.style.display="none";

});

</script>

</body>
</html>
